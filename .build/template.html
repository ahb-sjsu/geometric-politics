<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}} - {{book_title}}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <style>
    :root {
      --bg: #fafaf8;
      --fg: #222;
      --accent: #2c5f8a;
      --border: #ddd;
      --code-bg: #f4f4f0;
      --max-width: 48rem;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a2e;
        --fg: #e0e0e0;
        --accent: #7eb8da;
        --border: #444;
        --code-bg: #16213e;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.7;
      padding: 2rem 1rem;
    }
    .container {
      max-width: var(--max-width);
      margin: 0 auto;
    }
    nav.breadcrumb {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 0.85rem;
      margin-bottom: 2rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    nav.breadcrumb a {
      color: var(--accent);
      text-decoration: none;
    }
    nav.breadcrumb a:hover { text-decoration: underline; }
    nav.breadcrumb .sep { margin: 0 0.4rem; color: #999; }
    h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      line-height: 1.2;
      border-bottom: 2px solid var(--accent);
      padding-bottom: 0.5rem;
    }
    h2 {
      font-size: 1.5rem;
      margin-top: 2.5rem;
      margin-bottom: 0.75rem;
      color: var(--accent);
    }
    h3 {
      font-size: 1.2rem;
      margin-top: 2rem;
      margin-bottom: 0.5rem;
    }
    h4 {
      font-size: 1.05rem;
      margin-top: 1.5rem;
      margin-bottom: 0.4rem;
      font-style: italic;
    }
    p { margin-bottom: 1rem; }
    blockquote {
      border-left: 3px solid var(--accent);
      padding: 0.5rem 1.2rem;
      margin: 1.5rem 0;
      background: var(--code-bg);
      font-style: italic;
    }
    blockquote p:last-child { margin-bottom: 0; }
    code {
      font-family: 'Consolas', 'Fira Code', monospace;
      background: var(--code-bg);
      padding: 0.15rem 0.35rem;
      border-radius: 3px;
      font-size: 0.9em;
    }
    pre {
      background: var(--code-bg);
      padding: 1rem;
      border-radius: 4px;
      overflow-x: auto;
      margin: 1.5rem 0;
      border: 1px solid var(--border);
    }
    pre code {
      background: none;
      padding: 0;
    }
    a { color: var(--accent); }
    ul, ol {
      margin: 0.75rem 0 1rem 1.5rem;
    }
    li { margin-bottom: 0.3rem; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.5rem 0;
    }
    th, td {
      border: 1px solid var(--border);
      padding: 0.5rem 0.75rem;
      text-align: left;
    }
    th { background: var(--code-bg); }
    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2rem 0;
    }
    img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 1.5rem auto;
    }
    /* KaTeX display math */
    .katex-display {
      overflow-x: auto;
      overflow-y: hidden;
      padding: 0.5rem 0;
    }
    /* Definition/theorem boxes */
    .definition, .theorem, .axiom {
      border: 1px solid var(--border);
      border-left: 4px solid var(--accent);
      padding: 1rem 1.2rem;
      margin: 1.5rem 0;
      background: var(--code-bg);
      border-radius: 0 4px 4px 0;
    }
    footer {
      margin-top: 4rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #888;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <nav class="breadcrumb">
      <a href="../index.html">Geometric Series</a>
      <span class="sep">/</span>
      <a href="index.html">{{book_title}}</a>
      <span class="sep">/</span>
      <span>{{title}}</span>
    </nav>

    {{content}}

    <footer>
      <p>Part of the <em>Geometric Series</em> by A.H. Bowers</p>
      <p>Built automatically from source. Last updated: {{build_date}}</p>
    </footer>
  </div>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
    onload="renderMathInElement(document.body, {
      delimiters: [
        {left: '$$', right: '$$', display: true},
        {left: '$', right: '$', display: false},
        {left: '\\\\(', right: '\\\\)', display: false},
        {left: '\\\\[', right: '\\\\]', display: true}
      ],
      throwOnError: false
    });"></script>
</body>
</html>
