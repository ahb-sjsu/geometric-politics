<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}} &mdash; {{book_title}}</title>
  <meta name="description" content="{{title}} from {{book_title}}: {{book_subtitle}}, by Andrew H. Bond.">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../book/book.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
</head>

<body data-book-slug="{{book_slug}}">
  <nav id="main-nav">
    <div class="nav-inner">
      <a href="../index.html" class="nav-brand">
        <span class="brand-symbol">M</span>
        <span class="brand-text">{{book_title}}</span>
      </a>
      <button class="nav-toggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links" id="series-nav-list"></ul>
    </div>
  </nav>

  <article class="book-chapter">
    <div class="chapter-container">
      <nav class="breadcrumb" aria-label="Breadcrumb">
        <a href="../index.html">Geometric Series</a>
        <span class="breadcrumb-sep">&rsaquo;</span>
        <a href="index.html">{{book_title}}</a>
        <span class="breadcrumb-sep">&rsaquo;</span>
        <span class="breadcrumb-current">{{title}}</span>
      </nav>

      <div class="chapter-content">
{{content}}
      </div>

      <div class="chapter-nav-bottom">
        <a href="index.html" class="nav-toc">&larr; Contents</a>
      </div>
    </div>
  </article>

  <footer class="book-footer">
    <p>&copy; 2026 Andrew H. Bond. <em>{{book_title}}: {{book_subtitle}}.</em></p>
    <p class="footer-note">{{footer_note}}</p>
  </footer>

  <script src="../assets/js/series.js"></script>
  <script>
    window.addEventListener('scroll', function () {
      document.getElementById('main-nav').classList.toggle('scrolled', window.scrollY > 20);
    });
    document.querySelector('.nav-toggle')?.addEventListener('click', function () {
      document.querySelector('.nav-links').classList.toggle('open');
    });
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
    onload="renderMathInElement(document.body, {
      delimiters: [
        {left: '$$', right: '$$', display: true},
        {left: '$', right: '$', display: false},
        {left: '\\\\(', right: '\\\\)', display: false},
        {left: '\\\\[', right: '\\\\]', display: true}
      ],
      throwOnError: false
    });"></script>
</body>
</html>
